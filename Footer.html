    <script>
      (function(){
        var map = L.map('footer-map', {
          center: [48.7319, -3.4572],
          zoom: 14,
          zoomControl: true,
          scrollWheelZoom: false,
          attributionControl: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19
        }).addTo(map);

        var icon = L.divIcon({
          html: '<div style="background:#3b82f6;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>',
          className:'',
          iconSize:[14,14],
          iconAnchor:[7,7]
        });

        L.marker([48.7319, -3.4572], {icon: icon})
          .addTo(map)
          .bindPopup('<strong>FabLab Lannion</strong><br>Lannion, Bretagne')
          .openPopup();
      })();
    </script>
